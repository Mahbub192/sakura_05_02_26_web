<div class="flex flex-wrap gap-2">
  <!-- Appointment Button - navigates to book page -->
  <button
    (click)="goToBookAppointment()"
    class="rounded-lg bg-ent-primary text-white hover:opacity-90 px-3 py-1.5 flex items-center gap-1.5 shadow-md hover:shadow transition-all font-semibold text-xs">
    <span class="material-symbols-outlined text-base">add</span>
    <span>Appointment</span>
  </button>

  <!-- Refresh Button -->
  <button
    (click)="onRefresh()"
    class="rounded-lg bg-dark-green text-white hover:opacity-90 px-3 py-1.5 flex items-center gap-1.5 shadow-md hover:shadow transition-all font-semibold text-xs">
    <span class="material-symbols-outlined text-base">refresh</span>
    <span>Refresh</span>
  </button>

  <!-- Break Button -->
  <button
    (click)="openBreakModal()"
    class="rounded-lg bg-amber-500 text-white hover:opacity-90 px-3 py-1.5 flex items-center gap-1.5 shadow-md hover:shadow transition-all font-semibold text-xs">
    <span class="material-symbols-outlined text-base">schedule</span>
    <span>Break</span>
  </button>

  <!-- Next Patient Button -->
  <button
    (click)="onNext()"
    class="rounded-lg bg-accent-green text-dark-green hover:opacity-90 px-3 py-1.5 flex items-center gap-1.5 shadow-md hover:shadow transition-all font-semibold text-xs border border-accent-green/30">
    <span class="material-symbols-outlined text-base">arrow_forward</span>
    <span>Next</span>
  </button>

  <!-- Test Button -->
  <button
    (click)="onTestNext()"
    class="rounded-lg bg-white border border-dark-green text-dark-green hover:bg-dark-green hover:text-white px-3 py-1.5 flex items-center gap-1.5 shadow-sm hover:shadow transition-all font-semibold text-xs">
    <span class="material-symbols-outlined text-base">science</span>
    <span>Test</span>
  </button>
</div>

<!-- Break Modal -->
<app-modal
  [isOpen]="showBreakModal"
  [title]="'Take a Break'"
  (closeModal)="closeBreakModal()">
  <div class="space-y-4">
    <div>
      <label class="label">Break Notes (will be displayed on TV)</label>
      <textarea
        [(ngModel)]="breakNotes"
        rows="3"
        placeholder="e.g., Lunch break, Emergency call, etc."
        class="input">
      </textarea>
    </div>

    <div>
      <label class="label">Duration (minutes)</label>
      <input
        type="number"
        [(ngModel)]="breakDuration"
        min="5"
        max="120"
        class="input">
    </div>

    <div class="flex space-x-3 pt-4">
      <button
        (click)="closeBreakModal()"
        class="flex-1 btn btn-secondary">
        Cancel
      </button>
      <button
        (click)="confirmBreak()"
        class="flex-1 rounded-lg bg-ent-primary text-white font-bold px-4 py-2 hover:opacity-90 transition-opacity">
        Start Break
      </button>
    </div>
  </div>
</app-modal>
