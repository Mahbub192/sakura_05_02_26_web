<div class="mx-auto max-w-2xl">
  <button type="button" (click)="back()" class="mb-4 text-dark-green hover:underline">
    ← Back to Doctors
  </button>
  <h1 class="mb-6 text-2xl font-bold text-slate-900">{{ isEdit ? 'Edit Doctor' : 'Add Doctor' }}</h1>

  <p *ngIf="error" class="mb-4 rounded-lg bg-red-50 p-3 text-sm text-red-700">{{ error }}</p>
  <p *ngIf="success" class="mb-4 rounded-lg bg-green-50 p-3 text-sm text-green-700">{{ success }}</p>

  <div *ngIf="loading && !form.phone" class="rounded-xl bg-white p-8 text-center text-slate-500">
    Loading...
  </div>

  <form *ngIf="!loading || form.phone" (ngSubmit)="submit()" class="rounded-xl border border-slate-200 bg-white p-6">
    <div class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-slate-700">Phone <span class="text-red-500">*</span></label>
        <input
          type="text"
          [(ngModel)]="form.phone"
          name="phone"
          class="mt-1 w-full rounded-lg border border-slate-300 px-3 py-2"
          placeholder="01XXXXXXXXX"
          [readonly]="isEdit"
        />
        <p *ngIf="isEdit" class="mt-1 text-xs text-slate-500">Phone cannot be changed here.</p>
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-700">Full Name</label>
        <input
          type="text"
          [(ngModel)]="form.fullName"
          name="fullName"
          class="mt-1 w-full rounded-lg border border-slate-300 px-3 py-2"
          placeholder="Dr. Name"
        />
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-700">Email</label>
        <input
          type="email"
          [(ngModel)]="form.email"
          name="email"
          class="mt-1 w-full rounded-lg border border-slate-300 px-3 py-2"
          placeholder="email@example.com"
        />
      </div>
      <p *ngIf="!isEdit" class="text-sm text-slate-600">
        Default password will be <strong>password123</strong>. Doctor can change it after login.
      </p>
    </div>
    <div class="mt-6 flex gap-3">
      <button
        type="submit"
        [disabled]="loading"
        class="rounded-lg bg-dark-green px-4 py-2.5 text-sm font-bold text-white hover:opacity-90 disabled:opacity-50"
      >
        {{ loading ? 'Saving...' : (isEdit ? 'Update' : 'Create') }}
      </button>
      <button type="button" (click)="back()" class="rounded-lg border border-slate-300 px-4 py-2.5 text-sm font-medium text-slate-700 hover:bg-slate-50">
        Cancel
      </button>
    </div>
  </form>
</div>
