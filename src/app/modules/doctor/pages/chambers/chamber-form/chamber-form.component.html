<div class="w-full max-w-full mx-auto">
  <!-- Page Header -->
  <div class="flex items-center gap-3 mb-4">
    <button
      type="button"
      (click)="cancel()"
      class="flex items-center justify-center w-9 h-9 rounded-lg border border-slate-200 text-slate-600 hover:bg-slate-50 hover:border-dark-green/30 hover:text-dark-green transition-colors shrink-0">
      <span class="material-symbols-outlined text-xl">arrow_back</span>
    </button>
    <div>
      <h1 class="text-xl font-black tracking-tight text-dark-green flex items-center gap-2">
        <span class="material-symbols-outlined text-dark-green text-xl">apartment</span>
        {{ isEditMode ? 'Edit' : 'Create' }} Chamber
      </h1>
      <p class="text-slate-600 text-xs mt-0.5">{{ isEditMode ? 'Update chamber details' : 'Add a new chamber location' }}</p>
    </div>
  </div>

  <!-- Form -->
  <form [formGroup]="chamberForm" (ngSubmit)="onSubmit()" class="w-full rounded-xl bg-white border border-dark-green/5 shadow-sm overflow-hidden">
    <div class="p-5 lg:p-6 space-y-5">
      <!-- Basic Information -->
      <section class="chamber-form-section">
        <h2 class="chamber-form-section-title">Basic Information</h2>
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-3">
          <div class="sm:col-span-2">
            <label class="chamber-form-label">Chamber Name *</label>
            <input type="text" formControlName="name" class="chamber-form-input" placeholder="e.g., Main Chamber - Dhaka">
          </div>
          <div>
            <label class="chamber-form-label">Appointment Number *</label>
            <input type="text" formControlName="appointmentNumber" class="chamber-form-input" placeholder="e.g., CH-001">
          </div>
        </div>
      </section>

      <!-- Schedule -->
      <section class="chamber-form-section">
        <h2 class="chamber-form-section-title">Schedule</h2>
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-4">
          <div>
            <label class="chamber-form-label">Available Days *</label>
            <div class="flex flex-wrap gap-1.5">
              <button
                *ngFor="let day of days"
                type="button"
                (click)="toggleDay(day)"
                class="chamber-day-btn"
                [ngClass]="isDaySelected(day) ? 'chamber-day-btn-active' : 'chamber-day-btn-inactive'">
                {{ day.substring(0, 3) }}
              </button>
            </div>
          </div>
          <div class="grid grid-cols-3 gap-3">
            <div>
              <label class="chamber-form-label">Opening Time *</label>
              <input type="time" formControlName="openingTime" class="chamber-form-input">
            </div>
            <div>
              <label class="chamber-form-label">Report Time</label>
              <input type="time" formControlName="reportTime" class="chamber-form-input">
            </div>
            <div>
              <label class="chamber-form-label">Closing Time *</label>
              <input type="time" formControlName="closingTime" class="chamber-form-input">
            </div>
          </div>
        </div>
      </section>

      <!-- Timing & Fees -->
      <section class="chamber-form-section">
        <h2 class="chamber-form-section-title">Timing & Fees</h2>
        <div class="grid grid-cols-2 sm:grid-cols-4 gap-3">
          <div>
            <label class="chamber-form-label">Waiting Time - Visit (min) *</label>
            <input type="number" formControlName="waitingTimeVisit" class="chamber-form-input" min="5">
          </div>
          <div>
            <label class="chamber-form-label">Waiting Time - Report (min) *</label>
            <input type="number" formControlName="waitingTimeReport" class="chamber-form-input" min="5">
          </div>
          <div>
            <label class="chamber-form-label">Fee (First Time) *</label>
            <input type="number" formControlName="feeFirstTime" class="chamber-form-input" min="0" placeholder="৳">
          </div>
          <div>
            <label class="chamber-form-label">Fee (Follow-up) *</label>
            <input type="number" formControlName="feeFollowup" class="chamber-form-input" min="0" placeholder="৳">
          </div>
        </div>
      </section>

      <!-- Address -->
      <section class="chamber-form-section">
        <h2 class="chamber-form-section-title">Location</h2>
        <div>
          <label class="chamber-form-label">Address *</label>
          <textarea formControlName="address" rows="2" class="chamber-form-input chamber-form-textarea" placeholder="Enter complete chamber address"></textarea>
        </div>
      </section>

      <!-- Chamber Settings -->
      <section class="chamber-form-section">
        <h2 class="chamber-form-section-title">Chamber Settings</h2>
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-4">
          <div class="flex flex-col gap-2">
            <label class="chamber-form-checkbox">
              <input type="checkbox" formControlName="showSerialsInApp" class="chamber-form-checkbox-input">
              <span>Show serials in app</span>
            </label>
            <label class="chamber-form-checkbox">
              <input type="checkbox" formControlName="appUsersCanBook" class="chamber-form-checkbox-input">
              <span>App users can book appointment</span>
            </label>
            <label class="chamber-form-checkbox">
              <input type="checkbox" formControlName="autoDeleteDaily" class="chamber-form-checkbox-input">
              <span>Automatically delete appointments daily</span>
            </label>
            <label class="chamber-form-checkbox">
              <input type="checkbox" formControlName="useMultipleDevices" class="chamber-form-checkbox-input">
              <span>Use multiple devices</span>
            </label>
          </div>
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
            <div>
              <label class="chamber-form-label">Audio Announcements</label>
              <select formControlName="audioType" class="chamber-form-input">
                <option *ngFor="let option of audioOptions" [value]="option">{{ option }}</option>
              </select>
            </div>
            <div>
              <label class="chamber-form-label">Audio Gender</label>
              <select formControlName="audioGender" class="chamber-form-input">
                <option *ngFor="let gender of audioGenders" [value]="gender">{{ gender }}</option>
              </select>
            </div>
          </div>
        </div>
      </section>

      <!-- Video Settings -->
      <section class="chamber-form-section chamber-form-section-last">
        <h2 class="chamber-form-section-title">Video Settings</h2>
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3">
          <div class="sm:col-span-2 lg:col-span-1">
            <label class="chamber-form-label">Video URL (YouTube)</label>
            <input type="url" formControlName="videoUrl" class="chamber-form-input" placeholder="https://www.youtube.com/watch?v=...">
          </div>
          <div>
            <label class="chamber-form-label">Video Volume</label>
            <select formControlName="videoVolume" class="chamber-form-input">
              <option *ngFor="let volume of videoVolumes" [value]="volume">{{ volume }}</option>
            </select>
          </div>
        </div>
      </section>

      <!-- Success Message -->
      <div *ngIf="success" class="rounded-lg bg-accent-green/10 border border-accent-green/30 text-dark-green px-3 py-2 flex items-center gap-2 text-xs font-medium">
        <span class="material-symbols-outlined text-accent-green text-lg">check_circle</span>
        {{ success }}
      </div>

      <!-- Error Message -->
      <div *ngIf="error" class="rounded-lg bg-red-50 border border-red-200 text-red-700 px-3 py-2 flex items-center gap-2 text-xs font-medium">
        <span class="material-symbols-outlined text-red-600 text-lg">error</span>
        {{ error }}
      </div>

      <!-- Loading State -->
      <div *ngIf="loading" class="flex flex-col items-center justify-center py-6">
        <div class="inline-block animate-spin rounded-full h-10 w-10 border-b-2 border-dark-green"></div>
        <p class="mt-3 text-slate-600 text-xs">Loading chamber data...</p>
      </div>

      <!-- Actions -->
      <div class="flex flex-wrap gap-3 pt-2 border-t border-slate-100">
        <button
          type="button"
          (click)="cancel()"
          [disabled]="submitting"
          class="chamber-form-btn chamber-form-btn-secondary">
          Cancel
        </button>
        <button
          type="submit"
          [disabled]="submitting || loading"
          class="chamber-form-btn chamber-form-btn-primary">
          <span *ngIf="!submitting">{{ isEditMode ? 'Update Chamber' : 'Create Chamber' }}</span>
          <span *ngIf="submitting">{{ isEditMode ? 'Updating...' : 'Creating...' }}</span>
        </button>
      </div>
    </div>
  </form>
</div>
