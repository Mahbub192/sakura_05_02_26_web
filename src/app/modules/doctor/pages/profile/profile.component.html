<div class="mx-auto max-w-full flex flex-col gap-5">
  <div>
    <h1 class="text-2xl font-black tracking-tight text-dark-green flex items-center gap-2">
      <span class="material-symbols-outlined text-dark-green text-2xl">person</span>
      Profile
    </h1>
    <p class="text-slate-600 text-sm mt-1">Your account information</p>
  </div>

  <div *ngIf="currentUser" class="rounded-xl bg-white border border-dark-green/5 shadow-sm overflow-hidden">
    <div class="p-5 lg:p-6">
      <!-- Profile header -->
      <div class="flex flex-col sm:flex-row sm:items-center gap-4 pb-6 border-b border-slate-200">
        <div class="flex size-20 shrink-0 items-center justify-center rounded-full bg-dark-green text-white text-2xl font-bold ring-4 ring-accent-green/20">
          {{ currentUser.fullName.charAt(0).toUpperCase() || 'D' }}
        </div>
        <div class="min-w-0">
          <h2 class="text-xl font-bold text-slate-900 truncate">{{ currentUser.fullName }}</h2>
          <p class="text-slate-600 text-sm mt-0.5">{{ currentUser.phone }}</p>
          <span class="inline-flex items-center rounded-full bg-accent-green/20 px-2.5 py-0.5 text-xs font-bold text-dark-green capitalize mt-2">
            {{ currentUser.role }}
          </span>
        </div>
      </div>

      <!-- Details -->
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 pt-6">
        <div>
          <label class="profile-label flex items-center gap-2">
            <span class="material-symbols-outlined text-dark-green text-lg">mail</span>
            Email
          </label>
          <input type="text" [value]="currentUser.email || 'Not provided'" readonly class="profile-input">
        </div>
        <div>
          <label class="profile-label flex items-center gap-2">
            <span class="material-symbols-outlined text-dark-green text-lg">phone</span>
            Phone
          </label>
          <input type="text" [value]="currentUser.phone" readonly class="profile-input">
        </div>
      </div>
    </div>
  </div>

  <div *ngIf="!currentUser" class="rounded-xl bg-white border border-dark-green/5 shadow-sm p-12 text-center">
    <span class="material-symbols-outlined text-5xl text-slate-300">person_off</span>
    <p class="mt-3 text-slate-600 text-sm">No profile data available. Please sign in again.</p>
  </div>
</div>
