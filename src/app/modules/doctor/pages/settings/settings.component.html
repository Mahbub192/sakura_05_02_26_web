<div class="mx-auto max-w-full flex flex-col gap-5">
  <div>
    <h1 class="text-2xl font-black tracking-tight text-dark-green flex items-center gap-2">
      <span class="material-symbols-outlined text-dark-green text-2xl">settings</span>
      Settings
    </h1>
    <p class="text-slate-600 text-sm mt-1">Configure your system preferences</p>
  </div>

  <form [formGroup]="settingsForm" (ngSubmit)="onSubmit()" class="rounded-xl bg-white border border-dark-green/5 shadow-sm overflow-hidden">
    <div class="p-5 lg:p-6 space-y-6">
      <div *ngIf="success" class="rounded-lg bg-accent-green/10 border border-accent-green/30 text-dark-green px-4 py-3 flex items-center gap-2 text-sm font-medium">
        <span class="material-symbols-outlined text-accent-green">check_circle</span>
        {{ success }}
      </div>

      <section class="settings-section">
        <h2 class="settings-section-title flex items-center gap-2">
          <span class="material-symbols-outlined text-lg">event</span>
          Appointment Settings
        </h2>
        <div class="flex flex-col gap-3">
          <label class="settings-checkbox">
            <input type="checkbox" formControlName="patientsCanBook" class="settings-checkbox-input">
            <span>Patients can book appointment</span>
          </label>
          <label class="settings-checkbox">
            <input type="checkbox" formControlName="showSerialsInApp" class="settings-checkbox-input">
            <span>Show serials in app</span>
          </label>
          <label class="settings-checkbox">
            <input type="checkbox" formControlName="useMultipleDevices" class="settings-checkbox-input">
            <span>Use multiple devices</span>
          </label>
        </div>
      </section>

      <section class="settings-section">
        <h2 class="settings-section-title flex items-center gap-2">
          <span class="material-symbols-outlined text-lg">volume_up</span>
          Audio Settings
        </h2>
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
          <div>
            <label class="settings-label">Audio Type</label>
            <select formControlName="audioType" class="settings-input">
              <option value="None">None</option>
              <option value="Bangla">Bangla</option>
              <option value="English">English (Robotic)</option>
            </select>
          </div>
          <div>
            <label class="settings-label">Audio Gender</label>
            <select formControlName="audioGender" class="settings-input">
              <option value="Male">Male</option>
              <option value="Female">Female</option>
            </select>
          </div>
        </div>
      </section>

      <section class="settings-section settings-section-last">
        <h2 class="settings-section-title flex items-center gap-2">
          <span class="material-symbols-outlined text-lg">display_settings</span>
          Display Settings
        </h2>
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
          <div>
            <label class="settings-label">Language</label>
            <select formControlName="language" class="settings-input">
              <option value="English">English</option>
              <option value="বাংলা">বাংলা</option>
            </select>
          </div>
          <div>
            <label class="settings-label">Video Volume</label>
            <select formControlName="videoVolume" class="settings-input">
              <option value="Off">Off</option>
              <option value="Low">Low</option>
              <option value="Medium">Medium</option>
              <option value="High">High</option>
            </select>
          </div>
        </div>
      </section>

      <div class="flex flex-wrap gap-3 pt-2 border-t border-slate-200">
        <button type="submit" [disabled]="loading" class="settings-btn settings-btn-submit">
          <span *ngIf="!loading" class="flex items-center gap-2">
            <span class="material-symbols-outlined text-lg">save</span>
            Save Settings
          </span>
          <span *ngIf="loading" class="flex items-center gap-2">
            <span class="inline-block animate-spin rounded-full h-4 w-4 border-2 border-white border-t-transparent"></span>
            Saving...
          </span>
        </button>
      </div>
    </div>
  </form>
</div>
