<div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-2">
  <!-- Total -->
  <div class="rounded-lg bg-dark-green text-white px-3 py-2 shadow-md hover:shadow transition-all cursor-pointer border border-dark-green/20 flex items-center justify-between gap-2">
    <div class="flex items-center gap-1.5 min-w-0">
      <span class="material-symbols-outlined text-base opacity-90 shrink-0">groups</span>
      <span class="text-xs font-semibold opacity-90 truncate">Total</span>
    </div>
    <span class="text-lg font-bold shrink-0">{{ stats.total }}</span>
  </div>

  <!-- Waiting -->
  <div class="rounded-lg bg-amber-500 text-white px-3 py-2 shadow-md hover:shadow transition-all cursor-pointer border border-amber-500/20 flex items-center justify-between gap-2">
    <div class="flex items-center gap-1.5 min-w-0">
      <span class="material-symbols-outlined text-base opacity-90 shrink-0">schedule</span>
      <span class="text-xs font-semibold opacity-90 truncate">Waiting</span>
    </div>
    <span class="text-lg font-bold shrink-0">{{ stats.waiting }}</span>
  </div>

  <!-- Running -->
  <div class="rounded-lg bg-accent-green text-dark-green px-3 py-2 shadow-md hover:shadow transition-all cursor-pointer border border-accent-green/30 flex items-center justify-between gap-2">
    <div class="flex items-center gap-1.5 min-w-0">
      <span class="material-symbols-outlined text-base opacity-90 shrink-0">play_circle</span>
      <span class="text-xs font-semibold opacity-90 truncate">Running</span>
    </div>
    <span class="text-lg font-bold shrink-0">{{ stats.running }}</span>
  </div>

  <!-- Seen -->
  <div class="rounded-lg bg-slate-600 text-white px-3 py-2 shadow-md hover:shadow transition-all cursor-pointer border border-slate-600/20 flex items-center justify-between gap-2">
    <div class="flex items-center gap-1.5 min-w-0">
      <span class="material-symbols-outlined text-base opacity-90 shrink-0">check_circle</span>
      <span class="text-xs font-semibold opacity-90 truncate">Seen</span>
    </div>
    <span class="text-lg font-bold shrink-0">{{ stats.seen }}</span>
  </div>

  <!-- Absent -->
  <div class="rounded-lg bg-red-500 text-white px-3 py-2 shadow-md hover:shadow transition-all cursor-pointer border border-red-500/20 flex items-center justify-between gap-2">
    <div class="flex items-center gap-1.5 min-w-0">
      <span class="material-symbols-outlined text-base opacity-90 shrink-0">person_off</span>
      <span class="text-xs font-semibold opacity-90 truncate">Absent</span>
    </div>
    <span class="text-lg font-bold shrink-0">{{ stats.absent }}</span>
  </div>

  <!-- Report -->
  <div class="rounded-lg bg-ent-primary text-white px-3 py-2 shadow-md hover:shadow transition-all cursor-pointer border border-ent-primary/20 flex items-center justify-between gap-2">
    <div class="flex items-center gap-1.5 min-w-0">
      <span class="material-symbols-outlined text-base opacity-90 shrink-0">science</span>
      <span class="text-xs font-semibold opacity-90 truncate">Report</span>
    </div>
    <span class="text-lg font-bold shrink-0">{{ stats.report }}</span>
  </div>
</div>
